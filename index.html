<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaos Hub App</title>

<script type="module">
onAuthStateChanged(auth, (user) => {
  if(user){
    username = user.displayName;

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    document.getElementById("loginPage").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5fwpIYz4_0UCnQ_HpKtHa8ohnXdrWr20",
  authDomain: "modimemepage.firebaseapp.com",
  projectId: "modimemepage"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let username = localStorage.getItem("username") || prompt("Username?") || "Anon";
localStorage.setItem("username", username);

window.addPost = async function(type, inputId, imgId){
  let text = document.getElementById(inputId).value;
  let img = document.getElementById(imgId)?.files[0];
  let imageUrl = img ? URL.createObjectURL(img) : "";

  await addDoc(collection(db, type), {
    text, imageUrl, username,
    likes:0, laugh:0, skull:0,
    createdAt: serverTimestamp()
  });

  document.getElementById(inputId).value='';
}

window.react = async function(type,id,field){
  await updateDoc(doc(db,type,id), { [field]: increment(1) });
}

function listen(type, listId){
  const q = query(collection(db, type), orderBy("likes","desc"));
  onSnapshot(q, snap=>{
    let div = document.getElementById(listId);
    div.innerHTML="";

    snap.forEach(docSnap=>{
      let d = docSnap.data();
      let id = docSnap.id;

      let el = document.createElement('div');
      el.className='card';
      el.innerHTML = `
        <div class="head">@${d.username}</div>
        <div class="postText">${d.text || ''}</div>
        ${d.imageUrl ? `<img src="${d.imageUrl}" class="meme">` : ''}
        <div class="actions">
          <button onclick="react('${type}','${id}','likes')">❤️ ${d.likes}</button>
          <button onclick="react('${type}','${id}','laugh')">😂 ${d.laugh}</button>
          <button onclick="react('${type}','${id}','skull')">💀 ${d.skull}</button>
        </div>
      `;
      div.appendChild(el);
    });
  });
}

window.onload = ()=>{
  listen('confessions','confList');
  listen('opinions','opList');
  listen('stories','storyList');
  listen('memes','memeList');
};
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');
.loginPage{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at 30% 20%, rgba(106,92,255,.3), transparent),
              radial-gradient(circle at 70% 80%, rgba(0,198,255,.3), transparent),
              #0f0f0f;
  text-align:center;
  z-index:999;
}

.loginPage h1{
  font-size:32px;
  margin-bottom:10px;
}

.loginPage button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#6a5cff,#00c6ff);
  color:white;
  cursor:pointer;
  transition:.3s;
}

.loginPage button:hover{
  transform:scale(1.1);
}

body{
  margin:0;
  font-family:Poppins,sans-serif;
  background: radial-gradient(circle at 20% 0%,rgba(255,0,85,.25),transparent),
              radial-gradient(circle at 80% 20%,rgba(255,77,136,.25),transparent),
              #0f0f0f;
  color:white;
}

header{
  text-align:center;
  padding:16px;
  font-size:22px;
  font-weight:700;
  letter-spacing:1px;
  background: rgba(20,20,20,0.7);
  backdrop-filter: blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  position:sticky;
  top:0;
  z-index:10;
}

header::after{
  content:"";
  display:block;
  width:60px;
  height:3px;
  margin:6px auto 0;
  border-radius:10px;
  background:linear-gradient(90deg,#6a5cff,#00c6ff);
  box-shadow:0 0 12px rgba(0,198,255,0.6);
}

.page{display:none;padding:15px;max-width:800px;margin:auto}
.active{display:block}

.sectionTitle{
  font-size:18px;
  font-weight:600;
  margin-bottom:10px;
  background:linear-gradient(90deg,#fff,#ff8fb3);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  padding:14px;
  border-radius:16px;
  margin-bottom:12px;
  transition:.3s;
}
.card:hover{
  transform:translateY(-4px) scale(1.01);
  box-shadow:0 15px 30px rgba(0,0,0,.6);
}

textarea{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1c1c1c;
  color:white;
}

button{
  margin-top:8px;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff0055,#ff4d88);
  color:white;
  cursor:pointer;
  transition:.25s;
}
button:hover{
  transform:scale(1.07);
  box-shadow:0 10px 25px rgba(255,0,85,.4);
}

.meme{width:100%;border-radius:10px;margin-top:10px}

.actions button{margin-right:5px}

.postText{margin:8px 0}

.bottomNav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#111;
  padding:10px 0;
  box-shadow:0 -5px 20px rgba(0,0,0,.5);
}

.bottomNav button{
  background:none;
  border:none;
  color:#aaa;
  font-size:14px;
}

.bottomNav button:hover{
  color:white;
}
</style>
</head>

<body>
<div id="loginPage" class="loginPage">
  <h1>🔥 Chaos Hub</h1>
  <p>Enter the chaos… if you dare 👀</p>
  <button onclick="login()">Login with Google</button>
</div>

<div id="app" style="display:none;">
<header>Modi hate club</header>

<div id="home" class="page active">
  <div class="sectionTitle">🔥 Trending</div>
  <div class="card">Top posts based on likes coming here soon 👀</div>

  <div class="sectionTitle">💭 Random Thought</div>
  <div class="card">"ek din sharma bahr pitega"</div>
</div>

<div id="conf" class="page">
  <div class="sectionTitle">🤫 Confessions</div>
  <div class="card">
    <textarea id="confInput" placeholder="Drop something wild..."></textarea>
    <button onclick="addPost('confessions','confInput')">Post</button>
  </div>
  <div id="confList"></div>
</div>

<div id="op" class="page">
  <div class="sectionTitle">Gossip</div>
  <div class="card">
    <textarea id="opInput" placeholder="Hot take..."></textarea>
    <button onclick="addPost('opinions','opInput')">Post</button>
  </div>
  <div id="opList"></div>
</div>

<div id="story" class="page">
  <div class="sectionTitle">Bakchodi</div>
  <div class="card">
    <textarea id="storyInput" placeholder="Storytime..."></textarea>
    <button onclick="addPost('stories','storyInput')">Post</button>
  </div>
  <div id="storyList"></div>
</div>

<div id="meme" class="page">
  <div class="sectionTitle"> Memes</div>
  <div class="card">
    <textarea id="memeInput" placeholder="Caption..."></textarea>
    <input type="file" id="memeImg">
    <button onclick="addPost('memes','memeInput','memeImg')">Post Meme</button>
  </div>
  <div id="memeList"></div>
</div>

<div class="bottomNav">
  <button onclick="show('home')">🏠</button>
  <button onclick="show('conf')">😌</button>
  <button onclick="show('op')">😍</button>
  <button onclick="show('story')">💀</button>
  <button onclick="show('meme')">🥀</button>
</div>

<script>
function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
</div>
</body>
</html>
